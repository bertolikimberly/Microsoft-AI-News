name: Run digest worker

# Fires the /api/v1/internal/run-digest-worker webhook on the deployed
# backend so it produces the day's digests. Free on GitHub Actions
# (2000 min/month for private repos, unlimited for public).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   BACKEND_URL            e.g. https://your-app.azurecontainerapps.io
#   WORKER_SHARED_SECRET   matches WORKER_SHARED_SECRET in the backend's env

on:
  schedule:
    # Top of every hour. Required so the worker can hit each user at 08:00
    # in their own IANA timezone — a user in Sydney (UTC+10) and a user in
    # Los Angeles (UTC-8) need the worker to fire at very different UTC
    # moments. The worker is per-user idempotent
    # (digest_worker._IDEMPOTENCY_WINDOW) so 24 fires/day still produces at
    # most 1 digest/day/user.
    - cron: '0 * * * *'
  # Lets you trigger manually from the Actions tab — useful for testing.
  workflow_dispatch:

jobs:
  trigger-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger digest worker webhook
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          WORKER_SHARED_SECRET: ${{ secrets.WORKER_SHARED_SECRET }}
        run: |
          if [ -z "$BACKEND_URL" ] || [ -z "$WORKER_SHARED_SECRET" ]; then
            echo "::error::Missing BACKEND_URL or WORKER_SHARED_SECRET repo secret."
            exit 1
          fi
          # --fail makes curl exit non-zero on any HTTP 4xx/5xx so the
          # workflow surfaces backend errors as failed runs.
          # --max-time 300 accommodates cold starts + the LLM summarisation pass.
          curl --fail --silent --show-error --max-time 300 \
            -X POST \
            -H "Authorization: Bearer $WORKER_SHARED_SECRET" \
            "$BACKEND_URL/api/v1/internal/run-digest-worker"
