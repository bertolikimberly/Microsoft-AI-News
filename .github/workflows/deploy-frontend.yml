name: Build & deploy frontend to Azure Storage static website

# Builds the Next.js static export and uploads it to the $web container
# of the storage account provisioned by infra/main.bicep
# (`frontendStorageAccountName` output). Azure Static Web Apps isn't
# available in this subscription's allowed regions (see the comment in
# main.bicep above the `frontendStorage` resource) — a Storage account's
# static-website feature is the substitute, hosted in francecentral
# alongside the rest of the stack.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   AZURE_CREDENTIALS       — same value used by deploy-backend.yml
#                             (az ad sp create-for-rbac --sdk-auth)
#   AZURE_RESOURCE_GROUP    — e.g. mai-news-rg
#   FRONTEND_STORAGE_ACCOUNT — the `frontendStorageAccountName` Bicep output
#   NEXT_PUBLIC_API_URL     — the deployed backend's API base,
#                             e.g. https://mainews-api.<env>.azurecontainerapps.io/api/v1

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable static website hosting (idempotent)
        run: |
          az storage blob service-properties update \
            --account-name "${{ secrets.FRONTEND_STORAGE_ACCOUNT }}" \
            --auth-mode login \
            --static-website \
            --index-document index.html \
            --404-document index.html

      - name: Upload build to $web
        run: |
          az storage blob upload-batch \
            --account-name "${{ secrets.FRONTEND_STORAGE_ACCOUNT }}" \
            --auth-mode login \
            --destination '$web' \
            --source out \
            --overwrite
